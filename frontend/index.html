<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wingman — Where's My Context?</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🎲 Wingman</h1>
    <p class="tag">You woke up in Vegas with no memory of last night. Let's reconstruct it.</p>
  </header>

  <main>
    <section class="panel">
      <h2>1 · Drop the fragments</h2>
      <textarea id="fragment" placeholder="A receipt, a blurry photo caption, a half-remembered name..."></textarea>
      <div class="row">
        <button id="addBtn">Add fragment</button>
        <button id="seedBtn" class="ghost">Load demo night</button>
      </div>
      <ul id="log"></ul>
    </section>

    <section class="panel">
      <h2>2 · Commit to memory</h2>
      <div class="row">
        <button id="reconstructBtn">Remember the night</button>
        <button id="enrichBtn" class="ghost">Connect the dots</button>
      </div>
      <div class="row">
        <button id="graphBtn" class="ghost">View memory graph</button>
        <button id="forgetBtn" class="danger">Erase the night</button>
      </div>
      <p id="state" class="state"></p>
    </section>

    <section class="panel wide">
      <h2>3 · Interrogate the memory</h2>
      <div class="row">
        <input id="query" placeholder="What happened last night?" />
        <button id="recallBtn">Ask</button>
        <button id="contraBtn" class="ghost">Spot contradictions</button>
      </div>
      <div id="answers"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
